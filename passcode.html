<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Lock Screen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Dancing+Script:wght@500;600;700&family=Abril+Fatface&family=Caveat:wght@400;600&family=Noto+Sans+Devanagari:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Quicksand', sans-serif; background: #fcfbf9; user-select: none; }

    @keyframes heartbeat {
      0% { transform: scale(1); } 14% { transform: scale(1.1); }
      28% { transform: scale(1); } 42% { transform: scale(1.1); } 70% { transform: scale(1); }
    }
    .animate-heartbeat { animation: heartbeat 1.5s infinite; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }
    .animate-shake { animation: shake 0.4s ease-in-out; }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.8) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-120px) scale(1.2) rotate(20deg); opacity: 0; }
    }
    .floating-heart { position: absolute; animation: floatUp 1.2s ease-out forwards; pointer-events: none; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(253,244,245,0.5); }
    ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 9999px; }

    /* ===== FLIPBOOK ===== */
    .flipbook-scene {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .flipbook {
      position: relative;
      width: min(340px, 92vw);
      height: min(530px, 72vh);
      perspective: 1400px;
    }

    .flipbook-page {
      position: absolute;
      inset: 0;
      border-radius: 1.25rem;
      overflow: hidden;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      will-change: transform, opacity;
      opacity: 0;
      z-index: 1;
      pointer-events: none;
    }

    .flipbook-page.page-current {
      opacity: 1;
      z-index: 10;
      pointer-events: auto;
      box-shadow: 0 20px 50px rgba(92, 26, 36, 0.25);
    }

    .flipbook-page.page-next-peek {
      opacity: 0.6;
      z-index: 5;
      transform: rotateY(8deg) scale(0.97) translateX(5px);
      box-shadow: 0 10px 30px rgba(92, 26, 36, 0.1);
    }

    /* Spotify cover */
    .spotify-cover {
      background: linear-gradient(180deg, #6b2230 0%, #4a1520 55%, #3d1119 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      padding: 1.25rem 1.25rem 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      height: 100%;
      box-sizing: border-box;
      overflow-y: auto;
    }
    .spotify-cover__art {
      width: 100%; aspect-ratio: 1; object-fit: cover;
      border-radius: 0.75rem; margin-bottom: 0.85rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .spotify-cover__brand-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.65rem; }
    .spotify-cover__logo { width: 22px; height: 22px; flex-shrink: 0; }
    .spotify-cover__waveform { display: flex; align-items: flex-end; gap: 2.5px; height: 18px; flex: 1; }
    .spotify-cover__waveform span { width: 3px; background: #fff; border-radius: 1px; animation: waveBar 1.2s ease-in-out infinite; }
    .spotify-cover__waveform span:nth-child(1) { height: 6px; animation-delay: 0s; }
    .spotify-cover__waveform span:nth-child(2) { height: 12px; animation-delay: 0.1s; }
    .spotify-cover__waveform span:nth-child(3) { height: 8px; animation-delay: 0.2s; }
    .spotify-cover__waveform span:nth-child(4) { height: 16px; animation-delay: 0.15s; }
    .spotify-cover__waveform span:nth-child(5) { height: 10px; animation-delay: 0.25s; }
    .spotify-cover__waveform span:nth-child(6) { height: 14px; animation-delay: 0.05s; }
    .spotify-cover__waveform span:nth-child(7) { height: 7px; animation-delay: 0.3s; }
    .spotify-cover__waveform span:nth-child(8) { height: 11px; animation-delay: 0.12s; }
    .spotify-cover__waveform span:nth-child(9) { height: 9px; animation-delay: 0.22s; }
    .spotify-cover__waveform span:nth-child(10) { height: 13px; animation-delay: 0.08s; }
    .spotify-cover__waveform span:nth-child(11) { height: 5px; animation-delay: 0.18s; }
    .spotify-cover__waveform span:nth-child(12) { height: 15px; animation-delay: 0.28s; }
    @keyframes waveBar {
      0%, 100% { transform: scaleY(0.6); opacity: 0.7; }
      50% { transform: scaleY(1); opacity: 1; }
    }
    .spotify-cover__meta { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.85rem; }
    .spotify-cover__title { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; margin: 0 0 0.2rem; }
    .spotify-cover__artist { font-size: 0.8rem; font-weight: 400; opacity: 0.88; margin: 0; }
    .spotify-cover__like { width: 26px; height: 26px; flex-shrink: 0; margin-top: 0.15rem; }
    .spotify-cover__progress { margin-bottom: 0.35rem; }
    .spotify-cover__progress-track { height: 3px; background: rgba(255,255,255,0.25); border-radius: 999px; overflow: hidden; margin-bottom: 0.4rem; }
    .spotify-cover__progress-fill { width: 0%; height: 100%; background: #fff; border-radius: 999px; transition: width 0.5s linear; }
    .spotify-cover__times { display: flex; justify-content: space-between; font-size: 0.65rem; opacity: 0.85; margin-bottom: 0.85rem; }
    .spotify-cover__controls { display: flex; align-items: center; justify-content: space-between; padding: 0 0.25rem; }
    .spotify-cover__controls svg { width: 22px; height: 22px; opacity: 0.95; }
    .spotify-cover__play { width: 52px; height: 52px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,0,0,0.25); }
    .spotify-cover__play svg { width: 24px; height: 24px; margin-left: 3px; color: #5c1a24; }
    .spotify-cover__footer { text-align: center; font-family: 'Dancing Script', cursive; font-size: 1.15rem; font-weight: 600; margin-top: 0.75rem; opacity: 0.95; letter-spacing: 0.02em; }

    /* Inner pages */
    .flipbook-inner {
      background: linear-gradient(145deg, #fff9fb 0%, #fce7f3 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2.5rem 1.75rem; text-align: center;
      border: 1px solid #fbcfe8;
      height: 100%; box-sizing: border-box;
    }
    .flipbook-inner h3 { font-size: 1.65rem; font-weight: 700; color: #be185d; margin-bottom: 0.85rem; }
    .flipbook-inner p { font-size: 1rem; color: #4b5563; line-height: 1.7; max-width: 270px; }
    .flipbook-inner .page-emoji { font-size: 3rem; margin-bottom: 1rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05)); }

    /* Nav buttons */
    .flipbook-nav { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .flipbook-nav button { padding: 0.6rem 1.5rem; border-radius: 9999px; font-size: 0.85rem; font-weight: 700; transition: all 0.25s; cursor: pointer; }
    .btn-prev { background: #fdf2f8; color: #be185d; border: 1px solid #fbcfe8; }
    .btn-prev:hover:not(:disabled) { background: #fce7f3; }
    .btn-prev:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-next { background: #ec4899; color: #fff; border: none; box-shadow: 0 4px 14px rgba(236,72,153,0.35); }
    .btn-next:hover:not(:disabled) { background: #db2777; }
    .btn-next:disabled { opacity: 0.4; cursor: not-allowed; }
    .flipbook-hint { font-size: 0.75rem; color: #9ca3af; font-style: italic; }
    .flipbook-page-indicator { font-size: 0.75rem; font-weight: 600; color: #f472b6; letter-spacing: 0.05em; min-width: 80px; text-align: center; }

    /* ── KOI aur Dooja page ── */
    .koi-page {
      background: #fff;
      position: relative;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }
    .koi-love-text {
      position: absolute; top: 14px; left: 14px; width: 148px;
      line-height: 1.65; font-family: 'Caveat', cursive; font-size: 13px;
      color: #c0392b; opacity: .88; pointer-events: none; user-select: none;
    }
    .koi-title-block { position: absolute; top: 8px; right: 12px; text-align: right; line-height: 1.1; }
    .koi-title-koi { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; letter-spacing: 2px; color: #111; }
    .koi-title-aur { font-family: 'Noto Sans Devanagari', sans-serif; font-size: 24px; font-weight: 900; color: #111; }
    .koi-title-dooja { display: block; font-family: 'Dancing Script', cursive; font-size: 38px; font-weight: 700; color: #111; margin-top: -4px; }
    .koi-films-row { position: absolute; top: 130px; left: 12px; right: 12px; display: flex; gap: 10px; align-items: flex-start; }
    .koi-film {
      position: relative; background: #111; border-radius: 3px; padding: 8px 5px; flex: 1;
    }
    .koi-film::before, .koi-film::after {
      content: ''; position: absolute; left: 0; right: 0; height: 9px;
      background: repeating-linear-gradient(to right, #111 0px, #111 4px, #fff 4px, #fff 10px, #111 10px, #111 14px);
    }
    .koi-film::before { top: 0; border-radius: 3px 3px 0 0; }
    .koi-film::after  { bottom: 0; border-radius: 0 0 3px 3px; }
    .koi-film-label { position: absolute; top: 12px; left: 6px; font-size: 7px; color: #aaa; font-family: monospace; letter-spacing: 1px; writing-mode: vertical-rl; transform: rotate(180deg); }
    .koi-film-photo { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; border-radius: 1px; }
    .koi-film-placeholder {
      width: 100%; aspect-ratio: 4/3; background: #2a2a2a; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: #888; font-size: 10px;
      text-align: center; gap: 5px; border-radius: 1px; cursor: pointer; border: 2px dashed #555;
    }
    .koi-film-placeholder svg { width: 22px; height: 22px; stroke: #666; fill: none; stroke-width: 1.5; }
    .koi-film.right { transform: rotate(3deg) translateY(7px); }
    .koi-bottom-block { position: absolute; bottom: 46px; left: 16px; }
    .koi-kyun { font-family: 'Dancing Script', cursive; font-size: 50px; font-weight: 700; color: #8b0000; line-height: 1; }
    .koi-mujhe { font-family: 'Abril Fatface', serif; font-size: 58px; color: #111; line-height: 1; letter-spacing: 2px; }
    .koi-rose-accent { position: absolute; bottom: 0; right: 0; width: 100px; height: 120px; overflow: hidden; pointer-events: none; }
    .koi-rose-svg { position: absolute; bottom: -8px; right: -8px; width: 125px; opacity: .9; }
    .koi-brand { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); text-align: center; font-size: 9px; font-weight: 700; letter-spacing: .5px; line-height: 1.3; }
    .koi-brand span:first-child { color: #e74c3c; }
    .koi-brand span:last-child  { color: #f39c12; }
    .koi-upload-input { display: none; }

    /* ── Stamp / magazine page ── */
    .stamp-page {
      background: #fff;
      height: 100%;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 0;
    }
    .stamp-top-text {
      position: absolute;
      top: 14px;
      left: 0; right: 0;
      display: flex;
      align-items: baseline;
      justify-content: flex-start;
      padding: 0 18px;
      gap: 6px;
      z-index: 2;
    }
    .stamp-na {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 52px;
      font-weight: 900;
      color: #111;
      line-height: 1;
    }
    .stamp-tere-siwa {
      font-family: 'Dancing Script', cursive;
      font-size: 44px;
      font-weight: 700;
      color: #8b0000;
      line-height: 1;
    }
    .stamp-vinyl {
      position: absolute;
      right: -48px;
      top: 8px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: repeating-radial-gradient(circle, #222 0px, #333 2px, #1a1a1a 4px);
      opacity: 0.18;
      z-index: 1;
    }
    .stamp-frame-wrap {
      position: absolute;
      top: 78px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      width: 86%;
    }
    .stamp-frame {
      position: relative;
      background: #8b0000;
      padding: 12px;
      border-radius: 4px;
    }
    /* Perforated stamp edges */
    .stamp-frame::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 4px;
      background:
        radial-gradient(circle at 0% 0%, #fff 6px, transparent 6px),
        radial-gradient(circle at 100% 0%, #fff 6px, transparent 6px),
        radial-gradient(circle at 0% 100%, #fff 6px, transparent 6px),
        radial-gradient(circle at 100% 100%, #fff 6px, transparent 6px);
      background-size: 12px 12px;
    }
    .stamp-perfs {
      position: absolute;
      inset: 0;
      border-radius: 4px;
      overflow: hidden;
      pointer-events: none;
    }
    .stamp-photo-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1.05;
      background: #ddd;
      overflow: hidden;
    }
    .stamp-photo {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .stamp-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #c0392b22;
      color: #8b0000; font-size: 11px; gap: 6px;
      cursor: pointer; border: 2px dashed #8b0000;
    }
    .stamp-placeholder svg { width: 28px; height: 28px; stroke: #8b0000; fill: none; stroke-width: 1.5; }
    .stamp-upload { display: none; }
    .stamp-bottom-text {
      position: absolute;
      bottom: 42px;
      left: 0; right: 0;
      text-align: left;
      padding: 0 18px;
      z-index: 3;
    }
    .stamp-chahiye {
      font-family: 'Abril Fatface', serif;
      font-size: 62px;
      color: #111;
      line-height: 1;
      letter-spacing: 2px;
    }
    .stamp-brand {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .5px;
      line-height: 1.3;
      z-index: 3;
    }
    .stamp-brand span:first-child { color: #e74c3c; }
    .stamp-brand span:last-child  { color: #f39c12; }

    /* ── Letter page ── */
    .letter-page {
      background: #fffdf7;
      background-image:
        repeating-linear-gradient(transparent, transparent 24px, #e8dfc8 24px, #e8dfc8 25px);
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 1rem 1.1rem 1rem 0.8rem;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      font-family: 'Quicksand', sans-serif;
      position: relative;
      scrollbar-width: none;
    }
    .letter-page::-webkit-scrollbar { display: none; }
    .letter-page::before {
      content: '';
      position: absolute;
      left: 40px;
      top: 0; bottom: 0;
      width: 1.5px;
      background: rgba(236, 150, 150, 0.45);
      pointer-events: none;
    }
    .letter-header {
      padding-left: 2.2rem;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .letter-chapter {
      font-family: 'Dancing Script', cursive;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #be185d;
      margin-bottom: 0.12rem;
    }
    .letter-heading {
      font-family: 'Dancing Script', cursive;
      font-size: 1.4rem;
      font-weight: 700;
      color: #9d174d;
      line-height: 1.15;
      margin-bottom: 0.08rem;
    }
    .letter-date {
      font-size: 0.68rem;
      font-weight: 700;
      color: #be185d;
      letter-spacing: 0.06em;
    }
    .letter-divider {
      width: 44px;
      height: 2px;
      background: linear-gradient(to right, #f9a8d4, #fce7f3);
      border-radius: 2px;
      margin: 0 auto 0.55rem;
    }
    .letter-body {
      font-size: 0.73rem;
      line-height: 1.68;
      color: #374151;
      padding-left: 2.2rem;
      text-align: left;
      flex: 1;
    }
    .letter-body p { margin-bottom: 0.42rem; }
    .letter-body .highlight {
      font-family: 'Dancing Script', cursive;
      font-size: 0.9rem;
      font-weight: 700;
      color: #be185d;
    }

    /* ── Impression page (same ruled paper style) ── */
    .impression-page {
      background: #fffdf7;
      background-image: repeating-linear-gradient(transparent, transparent 24px, #e8dfc8 24px, #e8dfc8 25px);
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 1rem 1.1rem 1rem 0.8rem;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      font-family: 'Quicksand', sans-serif;
      position: relative;
      scrollbar-width: none;
    }
    .impression-page::-webkit-scrollbar { display: none; }
    .impression-page::before {
      content: '';
      position: absolute;
      left: 40px; top: 0; bottom: 0;
      width: 1.5px;
      background: rgba(236, 150, 150, 0.45);
      pointer-events: none;
    }

    /* ── Har Safar page ── */
    .safar-page {
      background: #8b0000;
      height: 100%;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 0;
    }
    .safar-top {
      padding: 14px 14px 6px;
      display: flex;
      align-items: baseline;
      gap: 4px;
      flex-shrink: 0;
    }
    .safar-har {
      font-family: 'Abril Fatface', serif;
      font-size: 52px;
      color: #fff;
      line-height: 1;
      background: #111;
      padding: 0 6px;
      border-radius: 2px;
    }
    .safar-safar {
      font-family: 'Playfair Display', serif;
      font-size: 46px;
      font-weight: 900;
      font-style: italic;
      color: #fff;
      line-height: 1;
      letter-spacing: 1px;
    }
    .safar-film-strip {
      position: absolute;
      top: 10px;
      right: -4px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      z-index: 4;
    }
    .safar-film-strip span {
      display: block;
      width: 18px; height: 12px;
      background: #222;
      border: 1px solid #555;
      border-radius: 1px;
    }
    /* Doily / lace border frame */
    .safar-frame-wrap {
      flex: 1;
      margin: 4px 14px 6px;
      position: relative;
      min-height: 0;
    }
    .safar-doily {
      position: absolute;
      inset: 0;
      border-radius: 6px;
      overflow: hidden;
    }
    /* SVG doily via clip — we'll use a CSS pattern approach */
    .safar-doily::before {
      content: '';
      position: absolute;
      inset: 0;
      background: #fff;
      border-radius: 6px;
    }
    /* inner photo area */
    .safar-doily::after {
      content: '';
      position: absolute;
      inset: 10px;
      background: #ccc;
      border-radius: 2px;
    }
    .safar-lace-border {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      border-radius: 6px;
      /* lace-like repeating pattern using box-shadow trick */
      border: 10px solid transparent;
      box-shadow:
        inset 0 0 0 2px #8b0000,
        inset 0 0 0 4px #fff,
        inset 0 0 0 6px #8b0000;
    }
    .safar-photo-inner {
      position: absolute;
      inset: 10px;
      z-index: 1;
      overflow: hidden;
      border-radius: 2px;
      cursor: pointer;
    }
    .safar-photo {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .safar-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #b0000022;
      color: #fff; font-size: 11px; gap: 6px;
      cursor: pointer;
      border: 2px dashed rgba(255,255,255,0.5);
    }
    .safar-placeholder svg { width: 26px; height: 26px; stroke: #fff; fill: none; stroke-width: 1.5; }
    .safar-upload { display: none; }
    .safar-ribbon {
      position: absolute;
      bottom: 8px;
      left: 8px;
      z-index: 3;
    }
    .safar-ribbon svg { width: 32px; height: 32px; }
    .safar-bottom {
      padding: 6px 14px 10px;
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-shrink: 0;
    }
    .safar-main {
      font-family: 'Abril Fatface', serif;
      font-size: 52px;
      color: #fff;
      line-height: 1;
    }
    .safar-tujhe {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 48px;
      font-weight: 900;
      color: #111;
      background: #fff;
      padding: 0 5px;
      border-radius: 2px;
      line-height: 1;
    }
    .safar-brand {
      position: absolute;
      bottom: 8px;
      right: 14px;
      text-align: center;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .5px;
      line-height: 1.3;
      z-index: 5;
    }

  <script>
    // ===== CONFIG =====
    let appConfig = { passcode: '1111', celebrationHeader: 'Access Granted, My Love!', showHint: true, soundMuted: false };
    let enteredPasscode = '';
    const maxPasscodeLength = 4;

    // ===== AUDIO =====
    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    const freqs = { '1':523.25,'2':587.33,'3':659.25,'4':698.46,'5':783.99,'6':880,'7':987.77,'8':1046.5,'9':1174.66,'0':440,'*':392,'#':349.23 };

    function playTone(key) {
      if (appConfig.soundMuted) return;
      initAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freqs[key] || 440, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.35);
    }

    function playSuccessChime() {
      if (appConfig.soundMuted) return;
      initAudio();
      [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const t = audioCtx.currentTime + i * 0.08;
        osc.type = 'sine'; osc.frequency.setValueAtTime(f, t);
        gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.45);
      });
    }

    function playError() {
      if (appConfig.soundMuted) return;
      initAudio();
      [150, 140].forEach((f, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const t = audioCtx.currentTime + i * 0.15;
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(f, t);
        gain.gain.setValueAtTime(0.08, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.25);
      });
    }

    const canvas = document.getElementById('confettiCanvas');
    const ctx = canvas.getContext('2d');
    let confettiArr = [], isCelebrating = false;
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * -canvas.height - 20;
        this.size = Math.random() * 12 + 8;
        this.sx = Math.random() * 4 - 2; this.sy = Math.random() * 5 + 3;
        this.rot = Math.random() * 360; this.rs = Math.random() * 4 - 2;
        this.heart = Math.random() > 0.55;
        const colors = ['#f472b6','#ec4899','#f43f5e','#fda4af','#fef08a','#fb7185'];
        this.color = colors[Math.floor(Math.random() * colors.length)];
      }
      update() {
        this.x += this.sx; this.y += this.sy; this.rot += this.rs;
        if (this.y > canvas.height) { this.y = -20; this.x = Math.random() * canvas.width; }
      }
      draw() {
        ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rot * Math.PI / 180);
        ctx.fillStyle = this.color;
        if (this.heart) {
          ctx.beginPath(); ctx.moveTo(0, 0);
          ctx.bezierCurveTo(-this.size/2, -this.size/2, -this.size, 0, 0, this.size);
          ctx.bezierCurveTo(this.size, 0, this.size/2, -this.size/2, 0, 0);
          ctx.fill();
        } else { ctx.beginPath(); ctx.arc(0, 0, this.size/2, 0, Math.PI*2); ctx.fill(); }
        ctx.restore();
      }
    }

    function startCelebration() {
      isCelebrating = true;
      confettiArr = Array.from({length: 120}, () => new Particle());
      (function animate() {
        if (!isCelebrating) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        confettiArr.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
      })();
      playSuccessChime();
      setTimeout(() => { isCelebrating = false; ctx.clearRect(0, 0, canvas.width, canvas.height); }, 7000);
    }

    function applyPageStates() {
      const pages = document.querySelectorAll('#flipbook .flipbook-page');
      pages.forEach((p, i) => {
        p.classList.remove('page-current', 'page-next-peek');
        p.style.transform = '';
        p.style.transition = '';
        p.style.pointerEvents = 'none';
        p.style.boxShadow = '';

        if (i === currentPage) {
          p.style.opacity = '1';
          p.style.zIndex = '10';
          p.style.pointerEvents = 'auto';
          p.classList.add('page-current');
        } else if (i === currentPage + 1) {
          p.style.opacity = '';
          p.style.zIndex = '5';
          p.classList.add('page-next-peek');
        } else {
          p.style.opacity = '0';
          p.style.zIndex = '1';
        }
      });
    }

    function goToNext() {
      if (isAnimating || currentPage >= totalPages - 1) return;
      isAnimating = true;

      const pages = document.querySelectorAll('#flipbook .flipbook-page');
      const cur = pages[currentPage];
      const nxt = pages[currentPage + 1];

      // Prepare next page: start rotated right, behind
      nxt.style.transition = 'none';
      nxt.style.opacity = '1';
      nxt.style.zIndex = '5';
      nxt.style.transform = 'rotateY(90deg)';
      nxt.style.pointerEvents = 'none';
      nxt.style.boxShadow = '0 20px 50px rgba(92,26,36,0.25)';
      nxt.classList.remove('page-next-peek');
      nxt.getBoundingClientRect(); // force reflow

      // Animate current page out (flip to left)
      cur.style.transition = 'transform 0.28s ease-in, opacity 0.28s ease-in';
      cur.style.transform = 'rotateY(-90deg)';
      cur.style.opacity = '0.5';

      setTimeout(() => {
        // Hide current
        cur.style.transition = 'none';
        cur.style.opacity = '0';
        cur.style.zIndex = '1';
        cur.style.transform = 'rotateY(-180deg)';
        cur.classList.remove('page-current');

        // Animate next page in
        nxt.style.transition = 'transform 0.32s ease-out, opacity 0.32s ease-out';
        nxt.style.transform = 'rotateY(0deg)';
        nxt.style.opacity = '1';
        nxt.style.zIndex = '10';
        nxt.classList.add('page-current');

        setTimeout(() => {
          currentPage++;
          isAnimating = false;
          // Apply peek to the page after next
          const pages2 = document.querySelectorAll('#flipbook .flipbook-page');
          pages2.forEach((p, i) => {
            p.classList.remove('page-next-peek');
            if (i === currentPage + 1) {
              p.style.transition = 'none';
              p.style.opacity = '0.6';
              p.style.zIndex = '5';
              p.style.transform = 'rotateY(8deg) scale(0.97) translateX(5px)';
              p.classList.add('page-next-peek');
            }
          });
          updateNav();
          playTone('2');
        }, 320);
      }, 260);
    }

    function goToPrev() {
      if (isAnimating || currentPage <= 0) return;
      isAnimating = true;

      const pages = document.querySelectorAll('#flipbook .flipbook-page');
      const cur = pages[currentPage];
      const prv = pages[currentPage - 1];

      // Prepare prev page: start rotated left, behind
      prv.style.transition = 'none';
      prv.style.opacity = '1';
      prv.style.zIndex = '5';
      prv.style.transform = 'rotateY(-90deg)';
      prv.style.pointerEvents = 'none';
      prv.style.boxShadow = '0 20px 50px rgba(92,26,36,0.25)';
      prv.classList.remove('page-current');
      prv.getBoundingClientRect();

      // Animate current out (flip to right)
      cur.style.transition = 'transform 0.28s ease-in, opacity 0.28s ease-in';
      cur.style.transform = 'rotateY(90deg)';
      cur.style.opacity = '0.5';

      setTimeout(() => {
        cur.style.transition = 'none';
        cur.style.opacity = '0';
        cur.style.zIndex = '1';
        cur.style.transform = 'rotateY(180deg)';
        cur.classList.remove('page-current');

        prv.style.transition = 'transform 0.32s ease-out, opacity 0.32s ease-out';
        prv.style.transform = 'rotateY(0deg)';
        prv.style.opacity = '1';
        prv.style.zIndex = '10';
        prv.classList.add('page-current');

        setTimeout(() => {
          currentPage--;
          isAnimating = false;
          // Peek at next
          const pages2 = document.querySelectorAll('#flipbook .flipbook-page');
          pages2.forEach((p, i) => {
            p.classList.remove('page-next-peek');
            if (i === currentPage + 1) {
              p.style.transition = 'none';
              p.style.opacity = '0.6';
              p.style.zIndex = '5';
              p.style.transform = 'rotateY(8deg) scale(0.97) translateX(5px)';
              p.classList.add('page-next-peek');
            }
          });
          updateNav();
          playTone('1');
        }, 320);
      }, 260);
    }

    function updateNav() {
      const prevBtn = document.getElementById('flipPrevBtn');
      const nextBtn = document.getElementById('flipNextBtn');
      const indicator = document.getElementById('flipPageIndicator');
      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = currentPage >= totalPages - 1;
      nextBtn.textContent = currentPage === 0 ? 'Open book →' : (currentPage >= totalPages - 1 ? '— The End —' : 'Next page →');
      indicator.textContent = currentPage === 0 ? 'Cover' : `Page ${currentPage} / ${totalPages - 1}`;
    }

    function appendDigit(d) {
      if (enteredPasscode.length < maxPasscodeLength) {
        enteredPasscode += d;
        playTone(d);
        updateSlots();
        if (enteredPasscode.length === maxPasscodeLength) setTimeout(verifyPasscode, 150);

      if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;
      if (e.key >= '0' && e.key <= '9') appendDigit(e.key);
      else if (e.key === '*' || e.key === '#') appendDigit(e.key);
      else if (e.key === 'Backspace') clearLast();
    });

    const songAudio = new Audio('1781078163311711.m4a');
    songAudio.loop = true;

    function fmtTime(s) {
      const m = Math.floor(s / 60);
      return m + ':' + String(Math.floor(s % 60)).padStart(2, '0');
    }
    songAudio.addEventListener('timeupdate', () => {
      const cur = document.getElementById('songCurrentTime');
      const fill = document.getElementById('songProgressFill');
      if (cur) cur.textContent = fmtTime(songAudio.currentTime);
      if (fill && songAudio.duration) fill.style.width = (songAudio.currentTime / songAudio.duration * 100) + '%';
    });
    songAudio.addEventListener('loadedmetadata', () => {
      const dur = document.getElementById('songDuration');
      if (dur) dur.textContent = fmtTime(songAudio.duration);
    });

    function toggleSongPlay() {
      if (songAudio.paused) {
        songAudio.play();
        const icon = document.getElementById('spotifyPlayIcon');
        if (icon) icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      } else {
        songAudio.pause();
        const icon = document.getElementById('spotifyPlayIcon');
        if (icon) icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
      }
    }

    function pauseSongIfPlaying() {
      if (!songAudio.paused) {
        songAudio.pause();
        const icon = document.getElementById('spotifyPlayIcon');
        if (icon) icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
      }
    }

    // ===== MUTE =====
    document.getElementById('muteBtn').addEventListener('click', () => {
      appConfig.soundMuted = !appConfig.soundMuted;
      const btn = document.getElementById('muteBtn');
      const icon = document.getElementById('volumeIcon');
      if (appConfig.soundMuted) {
        icon.innerHTML = `<path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.69-3.69a1 1 0 011.107-.234zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd"/>`;
        btn.classList.add('bg-gray-100','text-gray-400'); btn.classList.remove('bg-pink-50','text-pink-600');
        showToast("Muted", "🔇");
      } else {
        icon.innerHTML = `<path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.69-3.69a1 1 0 011.107-.234zM11 10a3 3 0 01-3 3H7.828l-1.764 1.764A5 5 0 0013 10V4.34a1 1 0 10-2 0V10z" clip-rule="evenodd"/>`;
        btn.classList.remove('bg-gray-100','text-gray-400'); btn.classList.add('bg-pink-50','text-pink-600');
        showToast("Sound on", "🔊");
        initAudio();
      }
    });
  </script>
</body>
</html>
